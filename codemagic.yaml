workflows:
  ios-build:
    name: Build iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          pod install
      - name: Build IPA (Unsigned)
        script: |
          xcodebuild build -workspace "SR Software.xcworkspace" \
            -scheme "SR Software" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/ios/iphoneos/*.app
