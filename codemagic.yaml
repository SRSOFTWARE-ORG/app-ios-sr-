workflows:
  ios-build:
    name: Build iOS Final
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Build App
        script: |
          # Procura o workspace automaticamente
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          SCHEME="SR Software"
          
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app
